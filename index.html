<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN V21.0</title>
    <style>
        body { background: #0F0907; color: #EADDCA; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .header { color: #8B4513; font-size: 22px; font-weight: bold; margin-bottom: 10px; }
        .screen-box { width: 100%; max-width: 500px; height: 280px; border-radius: 18px; background: #000; margin: 0 auto; overflow: hidden; border: 3px solid #3E2723; }
        #screen { width: 100%; height: 100%; object-fit: contain; }
        .btn-handshake { background: #E67E22; color: white; width: 95%; padding: 15px; margin-bottom: 10px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px auto; max-width: 500px; }
        .btn { background: #6D4C41; color: #F5F5DC; border: none; padding: 18px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">TITAN ELITE V21.0</div>
    <button class="btn-handshake" id="handshakeBtn" onclick="doHandshake()">🔓 שלב 1: לחץ כאן לאישור וידאו</button>
    
    <div class="screen-box"><img id="screen" src=""></div>
    <div id="ipInfo" style="font-size:10px; color:#8D6E63; margin-top:5px;">מזהה IP...</div>

    <div class="grid">
        <button class="btn" onclick="act('vol_up')">🔊 פלוס</button>
        <button class="btn" onclick="act('vol_down')">🔉 מינוס</button>
        <button class="btn" onclick="act('lock')">🔒 נעל PC</button>
        <button class="btn" style="background:#3E2723" onclick="act('shutdown')">🛑 כיבוי</button>
    </div>

    <script>
        let currentIP = "";
        async function sync() {
            const r = await fetch('https://raw.githubusercontent.com/yanivmizrachiy/hadash/main/salon_status.json').then(res => res.json());
            currentIP = r.ip;
            document.getElementById('ipInfo').innerText = "מחובר לכתובת: " + currentIP;
        }
        function doHandshake() { window.open("http://" + currentIP + ":5000/screen", "_blank"); }
        setInterval(() => { if(currentIP) document.getElementById('screen').src = "http://" + currentIP + ":5000/screen?t=" + Date.now(); }, 400);
        function act(cmd) { fetch("http://" + currentIP + ":5000/action", { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cmd}) }); }
        sync();
    </script>
</body>
</html>
