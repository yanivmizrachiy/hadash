<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><link rel="manifest" href="manifest.json"><meta name="mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN OMNI-HUB V9.0</title>
    <style>
        body { background: #1B1310; color: #D2B48C; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .header { color: #8B4513; text-shadow: 2px 2px #000; font-size: 22px; font-weight: bold; margin: 10px 0; }
        .selector { display: flex; gap: 8px; margin-bottom: 10px; }
        .n-btn { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #5D4037; background: #3E2723; color: #D2B48C; font-weight: bold; }
        .active { background: #8B4513; border-color: #F5F5DC; box-shadow: 0 0 15px #8B4513; }
        .screen-container { width: 98%; max-width: 500px; height: 280px; border: 4px solid #5D4037; border-radius: 15px; background: #000; margin: 0 auto; overflow: hidden; position: relative; }
        #screen { width: 100%; height: 100%; object-fit: contain; }
        .stats { font-size: 11px; color: #8D6E63; margin-top: 5px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { background: #6D4C41; color: #F5F5DC; border: none; padding: 18px; border-radius: 15px; font-weight: bold; border-bottom: 5px solid #3E2723; }
        .repair-btn { background: #455A64; color: #90A4AE; font-size: 10px; padding: 5px; margin-top: 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <button id="installBtn" style="display:none; background:#FFD700; color:#1B1310; width:100%; padding:20px; font-weight:bold; border:none; border-radius:15px; margin-bottom:15px; font-size:18px; box-shadow: 0 0 20px #FFD700;">📥 התקן אפליקציית TITAN למסך הבית</button>
    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            installBtn.style.display = 'block';
        });
        installBtn.addEventListener('click', (e) => {
            installBtn.style.display = 'none';
            deferredPrompt.prompt();
        });
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
    <div class="header">TITAN OMNI-CONTROL v9.0</div>
    <div class="selector">
        <button id="n-salon" class="n-btn active" onclick="setNode('salon')">🛋️ סלון</button>
        <button id="node-room" class="n-btn" onclick="setNode('room')">🖥️ חדר</button>
    </div>
    <div class="screen-container" id="screen-box"><img id="screen" src=""></div>
    <div id="stats" class="stats">Connecting to Global Mesh...</div>
    <div class="btn-grid">
        <button class="btn" onclick="toggleView()">📷 החלף מצלמה/מסך</button>
        <button class="btn" onclick="act('vol_up')">🔊 פלוס</button>
        <button class="btn" onclick="act('vol_down')">🔉 מינוס</button>
        <button class="btn" onclick="act('lock')">🔒 נעל PC</button>
        <button class="btn" style="background:#3E2723;" onclick="act('shutdown')">🛑 כיבוי</button>
    </div>
    <div class="repair-btn" onclick="act('repair')">🛠️ אבחון ותיקון מרחוק (Emergency)</div>
    <script>
        let nodes = { salon: { ip: "" }, room: { ip: "" } };
        let active = 'salon'; let view = 'screen';
        async function sync() {
            try {
                const s = await fetch('https://raw.githubusercontent.com/yanivmizrachiy/hadash/main/salon_status.json').then(r => r.json());
                const r = await fetch('https://raw.githubusercontent.com/yanivmizrachiy/hadash/main/room_status.json').then(r => r.json());
                nodes.salon.ip = s.ip; nodes.room.ip = r.ip;
                const h = await fetch(`http://${nodes[active].ip}:5000/health`).then(r => r.json());
                document.getElementById('stats').innerText = `CPU: ${h.cpu}% | RAM: ${h.ram}% | GLOBAL IP: ${nodes[active].ip}`;
            } catch(e) {}
        }
        function setNode(n) { active = n; document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active')); document.getElementById(n === 'salon' ? 'n-salon' : 'node-room').classList.add('active'); sync(); }
        function toggleView() { view = (view === 'screen' ? 'webcam' : 'screen'); }
        setInterval(() => { if(nodes[active].ip) document.getElementById('screen').src = `http://${nodes[active].ip}:5000/${view}?t=${Date.now()}`; }, 400);
        function act(cmd, extra = {}) { fetch(`http://${nodes[active].ip}:5000/action`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cmd, ...extra}) }); }
        document.getElementById('screen-box').onclick = function(e) { const r = this.getBoundingClientRect(); act('click', { x: (e.clientX - r.left)/r.width, y: (e.clientY - r.top)/r.height }); };
        sync(); setInterval(sync, 10000);
    </script>
</body>
</html>
