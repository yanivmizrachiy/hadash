<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN HUB PRO</title>
    <style>
        body { background: #1B1310; color: #D2B48C; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .header { color: #8B4513; text-shadow: 2px 2px #000; font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .screen-container { width: 98%; max-width: 500px; height: 280px; border: 4px solid #5D4037; border-radius: 20px; background: #000; margin: 0 auto; overflow: hidden; border: 3px solid #3E2723; box-shadow: 0 10px 40px #000; }
        #screen { width: 100%; height: 100%; object-fit: contain; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 98%; max-width: 500px; margin: 20px auto; }
        .btn { background: #6D4C41; color: #F5F5DC; border: none; padding: 18px; border-radius: 15px; font-weight: bold; border-bottom: 6px solid #3E2723; font-size: 16px; }
        .btn:active { transform: translateY(4px); border-bottom: 2px solid #3E2723; }
        input { width: 90%; max-width: 480px; padding: 18px; border-radius: 12px; border: none; background: #EADDCA; margin-top: 10px; font-size: 18px; text-align: right; }
    </style>
</head>
<body>
    <div class="header">TITAN ELITE V14.0</div>
    <div style="display:flex; gap:10px; margin-bottom:10px; justify-content:center;">
        <button class="btn" style="flex:1; background:#8B4513;" onclick="setNode('salon')">🛋️ סלון</button>
        <button class="btn" style="flex:1; background:#8B4513;" onclick="setNode('room')">🖥️ חדר</button>
    </div>
    <div class="screen-container" id="screen-box"><img id="screen" src=""></div>
    <div id="stats" style="margin-top:5px; font-size:12px; color:#8D6E63;">Syncing...</div>
    <input type="text" id="ti" placeholder="כתוב למחשב...">
    <div class="btn-grid">
        <button class="btn" onclick="act('type', {text: document.getElementById('ti').value})">שלח טקסט</button>
        <button class="btn" onclick="act('vol_up')">🔊 פלוס</button>
        <button class="btn" onclick="act('vol_down')">🔉 מינוס</button>
        <button class="btn" onclick="act('desktop')">🏠 שולחן</button>
        <button class="btn" onclick="act('lock')" style="background:#3E2723">🔒 נעל PC</button>
        <button class="btn" style="background:#3E2723; color:#FF8A65;" onclick="act('shutdown')">🛑 כיבוי</button>
    </div>
    <script>
        let nodes = { salon: { ip: "100.99.185.100" }, room: { ip: "100.99.185.100" } };
        let active = 'salon';
        async function sync() {
            try {
                const s = await fetch('https://raw.githubusercontent.com/yanivmizrachiy/hadash/main/salon_status.json').then(r => r.json());
                const r = await fetch('https://raw.githubusercontent.com/yanivmizrachiy/hadash/main/room_status.json').then(r => r.json());
                nodes.salon.ip = s.ip; nodes.room.ip = r.ip;
                const h = await fetch(`http://${nodes[active].ip}:5000/health`).then(r => r.json());
                document.getElementById('stats').innerText = `CPU: ${h.cpu}% | RAM: ${h.ram}% | IP: ${nodes[active].ip}`;
            } catch(e) {}
        }
        function setNode(n) { active = n; sync(); }
        setInterval(() => { if(nodes[active].ip) document.getElementById('screen').src = `http://${nodes[active].ip}:5000/screen?t=${Date.now()}`; }, 400);
        function act(cmd, extra = {}) { 
            fetch(`http://${nodes[active].ip}:5000/action`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cmd, ...extra}) });
            if(cmd==='type') document.getElementById('ti').value = '';
        }
        document.getElementById('screen-box').onclick = function(e) {
            const r = this.getBoundingClientRect();
            act('click', { x: (e.clientX - r.left)/r.width, y: (e.clientY - r.top)/r.height });
        };
        sync(); setInterval(sync, 10000);
    </script>
</body>
</html>
